name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS binary
        run: pyinstaller pm-altr.spec --clean --noconfirm

      - name: Create DMG-like zip
        run: |
          cd dist
          zip -r ../pm-altr-macos-${{ github.ref_name }}.zip PM-ALTR.app pm-altr

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm-altr-macos
          path: pm-altr-macos-*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows binary
        run: pyinstaller pm-altr-win.spec --clean --noconfirm

      - name: Create zip
        run: Compress-Archive -Path dist\pm-altr.exe -DestinationPath pm-altr-windows-${{ github.ref_name }}.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm-altr-windows
          path: pm-altr-windows-*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux binary
        run: pyinstaller pm-altr-win.spec --clean --noconfirm

      - name: Create tar.gz
        run: |
          cd dist
          tar czf ../pm-altr-linux-${{ github.ref_name }}.tar.gz pm-altr

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm-altr-linux
          path: pm-altr-linux-*.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pm-altr-macos-*.zip
            pm-altr-windows-*.zip
            pm-altr-linux-*.tar.gz
          generate_release_notes: true
